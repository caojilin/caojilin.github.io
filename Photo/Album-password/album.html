<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Album | Cao Jilin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="container">
      <h1><a class="href-black" href="../index.html">Cao Jilin</a></h1>
      <h2 id="album-title">Loading...</h2>
      <p>
        <a href="../album-password/index.html" class="href-blue"
          >&larr; Back to Albums</a
        >
      </p>
    </div>

    <!-- Gallery Container -->
    <div class="google-photos-grid" id="photo-grid"></div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
      <span class="close">&times;</span>
      <span class="prev">&#10094;</span>
      <img class="lightbox-content" id="lightbox-img" />
      <div class="lightbox-caption" id="lightbox-caption"></div>
      <span class="next">&#10095;</span>
    </div>
    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbz9sTva3KOu8DRADnapgUMV-WlFSB4c_iXauyMsJtv-uuc208G1bcZINdiIFf9GJFs/exec";
      const params = new URLSearchParams(window.location.search);
      const folderId = params.get("id");
      const folderName = params.get("name");
      const LOCAL_STORAGE_KEY = `albumPhotos_${folderId}`;

      document.getElementById("album-title").innerText = folderName;

      let allPhotos = [];
      let currentIndex = 0;

      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      const lightboxCaption = document.getElementById("lightbox-caption");

      function renderPhotos(photos) {
        allPhotos = photos;
        const grid = document.getElementById("photo-grid");
        grid.innerHTML = "";

        photos.forEach((photo, index) => {
          const img = document.createElement("img");

          // Dynamic thumbnail
          img.src = `https://drive.google.com/thumbnail?id=${photo.id}&sz=w1000`;
          img.alt = photo.name;

          // Retry fallback if high-res fails
          img.onerror = () => {
            console.warn(
              `Failed to load thumbnail for ${photo.name}, using smaller size`,
            );
            img.src = `https://drive.google.com/thumbnail?id=${photo.id}&sz=w500`;
          };

          img.onclick = () => openLightbox(index);
          grid.appendChild(img);

          // Preload high-res for lightbox
          const preloader = new Image();
          preloader.src = `https://drive.google.com/thumbnail?id=${photo.id}&sz=w2000`;
        });
      }

      // Try loading from localStorage
      const cached = localStorage.getItem(LOCAL_STORAGE_KEY);
      if (cached) {
        try {
          const photos = JSON.parse(cached);
          renderPhotos(photos);
          console.log("Loaded photos from localStorage");
        } catch (e) {
          console.error("Failed to parse cached photos:", e);
          localStorage.removeItem(LOCAL_STORAGE_KEY);
        }
      }

      // Always fetch fresh photos in background
      fetch(`${SCRIPT_URL}?action=listPhotos&id=${folderId}`)
        .then((res) => res.json())
        .then((photos) => {
          photos.sort((a, b) => a.name.localeCompare(b.name));
          localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(photos));
          renderPhotos(photos);
          console.log("Fetched photos from server and updated cache");
        })
        .catch((err) => console.error("Failed to fetch photos:", err));

      // Lightbox functions
      function openLightbox(index) {
        currentIndex = index;
        updateLightbox();
        lightbox.style.display = "flex";
        document.body.style.overflow = "hidden";
      }

      function updateLightbox() {
        const photo = allPhotos[currentIndex];
        lightboxImg.src = `https://drive.google.com/thumbnail?id=${photo.id}&sz=w2000`;
        lightboxCaption.textContent = photo.name;
      }

      function changeImage(step) {
        currentIndex =
          (currentIndex + step + allPhotos.length) % allPhotos.length;
        updateLightbox();
      }

      function closeLightbox() {
        lightbox.style.display = "none";
        document.body.style.overflow = "auto";
      }

      document.addEventListener("keydown", (e) => {
        if (lightbox.style.display === "flex") {
          if (e.key === "ArrowRight") changeImage(1);
          if (e.key === "ArrowLeft") changeImage(-1);
          if (e.key === "Escape") closeLightbox();
        }
      });

      document.querySelector(".close").onclick = closeLightbox;
      document.querySelector(".prev").onclick = () => changeImage(-1);
      document.querySelector(".next").onclick = () => changeImage(1);

      lightbox.onclick = (e) => {
        // Don't trigger navigation if they specifically clicked the close button
        if (e.target.classList.contains("close")) return;

        // Check where the user clicked horizontally
        if (e.clientX < window.innerWidth / 2) {
          changeImage(-1); // Left half of the screen
        } else {
          changeImage(1); // Right half of the screen
        }
      };
    </script>
  </body>
</html>
