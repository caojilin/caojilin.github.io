<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Album | Cao Jilin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="../style.css" />
    <link rel="stylesheet" type="text/css" href="../../global.style.css" />
  </head>

  <body>
    <div class="container">
      <h1><a class="href-black" href="../index.html">Cao Jilin</a></h1>
      <h2 id="album-title">Loading...</h2>
      <p>
        <a href="../Album-password/index.html" class="href-blue"
          >&larr; Back to Albums</a
        >
      </p>
    </div>

    <!-- Gallery Container -->
    <div class="google-photos-grid" id="photo-grid"></div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
      <span class="close">&times;</span>
      <span class="prev">&#10094;</span>
      <img class="lightbox-content" id="lightbox-img" />
      <div class="lightbox-caption" id="lightbox-caption"></div>
      <span class="next">&#10095;</span>
    </div>
    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbz9sTva3KOu8DRADnapgUMV-WlFSB4c_iXauyMsJtv-uuc208G1bcZINdiIFf9GJFs/exec";
      // 1. Get URL parameters first
      const params = new URLSearchParams(window.location.search);
      const folderId = params.get("id");
      const folderName = params.get("name");

      // 2. Define UI elements
      const grid = document.getElementById("photo-grid");
      const lightbox = document.getElementById("lightbox");
      const lightboxImg = document.getElementById("lightbox-img");
      const lightboxCaption = document.getElementById("lightbox-caption");
      const albumTitle = document.getElementById("album-title");

      let allPhotos = [];
      let currentIndex = 0;

      // 3. Validation and Core Logic
      if (!folderId) {
        albumTitle.innerText = "Album Not Found";
        grid.innerHTML =
          "<p>No album ID provided. Please return to the gallery and try again.</p>";
      } else {
        albumTitle.innerText = folderName || "Album";
        const LOCAL_STORAGE_KEY = `photos_${folderId}`;
        const cached = localStorage.getItem(LOCAL_STORAGE_KEY);

        // Initial Render from Cache
        if (cached) {
          const photos = JSON.parse(cached);
          renderPhotos(photos);
        }

        // Background fetch to update or load
        fetch(`${SCRIPT_URL}?action=listPhotos&id=${folderId}`)
          .then((res) => res.json())
          .then((photos) => {
            photos.sort((a, b) => a.name.localeCompare(b.name));
            const freshData = JSON.stringify(photos);

            if (freshData !== cached) {
              localStorage.setItem(LOCAL_STORAGE_KEY, freshData);
              renderPhotos(photos);
            }
          })
          .catch((err) => {
            console.error("Fetch failed:", err);
            if (!cached) {
              grid.innerHTML =
                "<p>Could not load photos. Please check your connection.</p>";
            }
          });
      }

      function renderPhotos(photos) {
        allPhotos = photos;
        grid.innerHTML = "";

        if (photos.length === 0) {
          grid.innerHTML = "<p>No photos found in this album.</p>";
          return;
        }

        photos.forEach((photo, index) => {
          const img = document.createElement("img");
          img.src = `https://drive.google.com/thumbnail?id=${photo.id}&sz=w1000`;
          img.alt = photo.name;
          img.onerror = () => {
            img.src = `https://drive.google.com/thumbnail?id=${photo.id}&sz=w500`;
          };
          img.onclick = () => openLightbox(index);
          grid.appendChild(img);

          const preloader = new Image();
          preloader.src = `https://drive.google.com/thumbnail?id=${photo.id}&sz=w1000`;
        });
      }

      // --- Lightbox Functions ---
      function openLightbox(index) {
        currentIndex = index;
        updateLightbox();
        lightbox.style.display = "flex";
        document.body.style.overflow = "hidden";
      }

      function updateLightbox() {
        const photo = allPhotos[currentIndex];
        lightboxImg.src = `https://drive.google.com/thumbnail?id=${photo.id}&sz=w2000`;
        lightboxCaption.textContent = photo.name;
      }

      function changeImage(step) {
        if (allPhotos.length === 0) return;
        currentIndex =
          (currentIndex + step + allPhotos.length) % allPhotos.length;
        updateLightbox();
      }

      function closeLightbox() {
        lightbox.style.display = "none";
        document.body.style.overflow = "auto";
      }

      // --- Event Listeners ---
      document.addEventListener("keydown", (e) => {
        if (lightbox.style.display === "flex") {
          if (e.key === "ArrowRight") changeImage(1);
          if (e.key === "ArrowLeft") changeImage(-1);
          if (e.key === "Escape") closeLightbox();
        }
      });

      document.querySelector(".close").onclick = closeLightbox;
      document.querySelector(".prev").onclick = (e) => {
        e.stopPropagation();
        changeImage(-1);
      };
      document.querySelector(".next").onclick = (e) => {
        e.stopPropagation();
        changeImage(1);
      };

      lightbox.onclick = (e) => {
        if (
          e.target.classList.contains("close") ||
          e.target.classList.contains("prev") ||
          e.target.classList.contains("next")
        )
          return;

        if (e.clientX < window.innerWidth / 2) {
          changeImage(-1);
        } else {
          changeImage(1);
        }
      };
    </script>
  </body>
</html>
