<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Photos - Cao Jilin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Freehand&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container header">
      <h1>
        <a class="href-black" href="../index.html">Cao Jilin</a>
      </h1>
    </div>

    <div class="container">
      <div class="row1">
        <div class="verse">
          <h3>
            <a href="../../Photo/index.html" class="href-blue"
              >&larr; Back to</a
            >
          </h3>
        </div>

        <div class="album-grid" id="album-grid"></div>
      </div>
    </div>
    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbz9sTva3KOu8DRADnapgUMV-WlFSB4c_iXauyMsJtv-uuc208G1bcZINdiIFf9GJFs/exec";
      const CACHE_KEY = "Album-password";
      const grid = document.getElementById("album-grid");

      function renderFolders(folders) {
        grid.innerHTML = "";
        folders.forEach((folder) => {
          grid.innerHTML += `
        <a href="album.html?id=${folder.id}&name=${encodeURIComponent(folder.name)}" class="album-card">
            <div class="album-title">${folder.name}</div>
        </a>
      `;
        });
      }

      const cached = localStorage.getItem(CACHE_KEY);

      if (cached) {
        // 1. Data exists, so render it and STOP. No network request is made.
        renderFolders(JSON.parse(cached));
        console.log("Loaded from local storage. Fetch skipped.");
      } else {
        // 2. Data does not exist, so show loader and fetch for the first time.
        grid.innerHTML = '<div class="loader"></div>';

        fetch(SCRIPT_URL + "?action=listFolders")
          .then((res) => res.json())
          .then((folders) => {
            localStorage.setItem(CACHE_KEY, JSON.stringify(folders));
            renderFolders(folders);
          })
          .catch((err) => {
            grid.innerHTML = "<p>Error loading albums.</p>";
            console.error(err);
          });
      }
    </script>
  </body>
</html>
