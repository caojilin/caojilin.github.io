<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <title>Photos - Cao Jilin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Freehand&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <div class="container header">
      <h1>
        <a class="href-black" href="../index.html">Cao Jilin</a>
      </h1>
    </div>

    <div class="container">
      <div class="row1">
        <div class="verse">
          <h3>
            <a href="../../Photo/index.html" class="href-blue"
              >&larr; Back to</a
            >
          </h3>
        </div>

        <div class="album-grid" id="album-grid"></div>
      </div>
    </div>
    <script>
      const SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbz9sTva3KOu8DRADnapgUMV-WlFSB4c_iXauyMsJtv-uuc208G1bcZINdiIFf9GJFs/exec";
      const LOCAL_STORAGE_KEY = "photoFolders";

      function renderFolders(folders) {
        const grid = document.getElementById("album-grid");
        grid.innerHTML = ""; // clear existing content
        folders.forEach((folder) => {
          grid.innerHTML += `
            <a href="album.html?id=${folder.id}&name=${encodeURIComponent(folder.name)}" class="album-card">
                <div class="album-title">${folder.name}</div>
            </a>
        `;
        });
      }

      // Check if cached data exists
      const cached = localStorage.getItem(LOCAL_STORAGE_KEY);
      if (cached) {
        try {
          const folders = JSON.parse(cached);
          renderFolders(folders);
          console.log("Loaded folders from localStorage");
        } catch (e) {
          console.error("Failed to parse cached folders:", e);
          localStorage.removeItem(LOCAL_STORAGE_KEY);
        }
      }

      // Always fetch fresh data in background and update cache
      fetch(SCRIPT_URL + "?action=listFolders")
        .then((res) => res.json())
        .then((folders) => {
          localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(folders));
          renderFolders(folders);
          console.log("Fetched folders from server and updated cache");
        })
        .catch((err) => console.error("Failed to fetch folders:", err));
    </script>
  </body>
</html>
