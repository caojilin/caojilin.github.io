mcmbBWjklXxn7j-u4VJn']
    const grid = document.getElementById("photo-grid");
    const lightbox = document.getElementById("lightbox");
    const lightboxImg = document.getElementById("lightbox-img");

    const btnClose = document.querySelector(".close");
    const btnPrev = document.querySelector(".prev");
    const btnNext = document.querySelector(".next");

    let currentIndex = 0;

    // ========================
    // Gallery
    // ========================
    function createGallery() {
      imageUrls.forEach((url, index) => {
        const img = document.createElement("img");
        img.src = url;
        img.loading = "lazy"; // performance boost
        img.addEventListener("click", () => openLightbox(index));
        grid.appendChild(img);
      });
    }

    // ========================
    // Lightbox
    // ========================
    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lightbox.style.display = "flex";
      document.body.style.overflow = "hidden";
    }

    function closeLightbox() {
      lightbox.style.display = "none";
      document.body.style.overflow = "auto";
    }

    function updateLightbox() {
      lightboxImg.src = imageUrls[currentIndex];
      // This is where you'd set the text. 
      // For now, I've put a placeholder so you can see the space.
      document.getElementById("lightbox-caption").innerText = "Photo " + (currentIndex + 1) + " of " + imageUrls.length;
    }

    function changeImage(step) {
      currentIndex =
        (currentIndex + step + imageUrls.length) % imageUrls.length;
      updateLightbox();
    }

    // ========================
    // Events
    // ========================
    btnClose.addEventListener("click", closeLightbox);
    btnPrev.addEventListener("click", () => changeImage(-1));
    btnNext.addEventListener("click", () => changeImage(1));

    document.addEventListener("keydown", (e) => {
      if (lightbox.style.display !== "flex") return;

      if (e.key === "ArrowRight") changeImage(1);
      if (e.key === "ArrowLeft") changeImage(-1);
      if (e.key === "Escape") closeLightbox();
    });

    lightbox.addEventListener("click", (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // ========================
    // Init
    // ========================
    createGallery();
  </script>
