<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Album | Cao Jilin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="container">
        <h1><a class="href-black" href="../index.html">Cao Jilin</a></h1>
        <h2 id="album-title">Loading...</h2>
        <p><a href="../paintings/index.html" class="href-blue">&larr; Back to Albums</a></p>
    </div>

    <!-- Gallery Container -->
    <div class="google-photos-grid" id="photo-grid"></div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <span class="prev">&#10094;</span>
        <img class="lightbox-content" id="lightbox-img">
        <div class="lightbox-caption" id="lightbox-caption"></div>
        <span class="next">&#10095;</span>
    </div>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNwKn_vfLb6wPXpXbIm78Lb-gRloYgaPRV58Eq3Eaoz-7SUi4pX-M5fYTvkChCUry6/exec";
        const params = new URLSearchParams(window.location.search);
        const folderId = params.get('id');
        const folderName = params.get('name');

        document.getElementById('album-title').innerText = folderName;

        let allPhotos = [];
        let currentIndex = 0;

        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const lightboxCaption = document.getElementById('lightbox-caption');

        fetch(`${SCRIPT_URL}?action=listPhotos&id=${folderId}`)
            .then(res => res.json())
            .then(photos => {
                allPhotos = photos;
                const grid = document.getElementById('photo-grid');
                grid.innerHTML = "";

                photos.forEach((photo, index) => {
                    // 1. Create the grid image (as you already do)
                    const img = document.createElement('img');
                    img.src = `https://drive.google.com/thumbnail?id=${photo.id}&sz=w1000`;
                    img.onclick = () => openLightbox(index);
                    grid.appendChild(img);

                    // 2. TRIGGER THE CACHE: Pre-download the high-res version
                    const preloader = new Image();
                    preloader.src = `https://drive.google.com/thumbnail?id=${photo.id}&sz=w2000`;
                });
            });

        function openLightbox(index) {
            currentIndex = index;
            updateLightbox();
            lightbox.style.display = 'flex'; // Only shows when an image is clicked
            document.body.style.overflow = 'hidden';
        }

        function updateLightbox() {
            const photo = allPhotos[currentIndex];
            lightboxImg.src = `https://drive.google.com/thumbnail?id=${photo.id}&sz=w2000`;
            lightboxCaption.textContent = photo.name;
        }

        function changeImage(step) {
            currentIndex = (currentIndex + step + allPhotos.length) % allPhotos.length;
            updateLightbox();
        }

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (lightbox.style.display === 'flex') {
                if (e.key === "ArrowRight") changeImage(1);
                if (e.key === "ArrowLeft") changeImage(-1);
                if (e.key === "Escape") closeLightbox();
            }
        });

        function closeLightbox() {
            lightbox.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        // Add this line after your variable declarations
        document.querySelector('.close').onclick = closeLightbox;

        // Also, let's make the navigation buttons work while we're at it
        document.querySelector('.prev').onclick = () => changeImage(-1);
        document.querySelector('.next').onclick = () => changeImage(1);

        lightbox.onclick = (e) => {
            if (e.target === lightbox) {
                closeLightbox();
            }
        };
    </script>

</body>

</html>
